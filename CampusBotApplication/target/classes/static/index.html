<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusBot - AI FAQ Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .chat-container {
            max-width: 650px;
            margin: 50px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .chat-header {
            background-color: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background-color: #f9f9f9;
            border-bottom: 1px solid #eee;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 80%;
        }
        .user-message {
            background-color: #007bff;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        .bot-message {
            background-color: #e9ecef;
            color: #333;
            margin-right: auto;
        }
        .meta-text {
            font-size: 0.75rem;
            color: #6c757d;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h3>🎓 CampusBot Dashboard</h3>
        <p class="mb-0">AI FAQ Assistant Service</p> [cite: 6, 31]
    </div>
    
    <div class="chat-box" id="chatBox">
        <div class="message bot-message">
            Hello! I am CampusBot. Ask me anything about campus life, admissions, or tech support.
        </div>
    </div>
    
    <div class="p-3 bg-white">
        <div class="input-group">
            <input type="text" id="userQuery" class="form-control" placeholder="Type your university question here..." required>
            <button class="btn btn-primary" type="button" id="sendBtn" onclick="sendQuestion()">Ask Bot</button>
        </div>
    </div>
</div>

<script>
    async function sendQuestion() {
        const queryInput = document.getElementById('userQuery');
        const chatBox = document.getElementById('chatBox');
        const sendBtn = document.getElementById('sendBtn');
        const queryText = queryInput.value.trim();

        if (!queryText) return;

        appendMessage(queryText, 'user-message');
        queryInput.value = ''; // Clear input field
       
        sendBtn.disabled = true;
        sendBtn.innerText = "Thinking...";

        try {
            // 2. Format Request Payload and hit the Ingestion REST EndPoint
            const response = await fetch('/api/ask-question', { 
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ query: queryText })
            });

            const data = await response.json();

            // 3. Append parsed Bot Response or Graceful Error Message
            if (response.ok) {
                appendMessage(data.answer, 'bot-message', data.timestamp);
            } else {
                appendMessage(data.answer || "An unexpected connectivity error occurred.", 'bot-message'); 
            }

        } catch (error) {
            // Handle Network timeout or Server Down states gracefully
            appendMessage("Unable to reach the server. Please check if your Spring Boot app is running.", 'bot-message');
        } finally {
            // Re-enable input controls
            sendBtn.disabled = false;
            sendBtn.innerText = "Ask Bot";
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
        }
    }

    function appendMessage(text, className, timestamp = '') {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        
        if (timestamp) {
            const meta = document.createElement('span');
            meta.className = 'meta-text';
            meta.innerText = `Sent: ${new Date(timestamp).toLocaleTimeString()}`;
            msgDiv.appendChild(meta);
        }
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Allow hitting 'Enter' key to send message
    document.getElementById('userQuery').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            sendQuestion();
        }
    });
</script>

</body>
</html>
